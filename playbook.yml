---
- name: Setup Nginx and Docker
  hosts: webservers
  become: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start and enable Nginx
      systemd:
        name: nginx
        state: started
        enabled: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Run Hello World container
      docker_container:
        name: hello-world
        image: nginxdemos/hello
        state: started
        ports:
          - "8080:80"

    - name: Copy Nginx config
      copy:
        dest: /etc/nginx/sites-available/hello-world
        content: |
          server {
              listen 80;
              server_name _;

              access_log /var/log/nginx/hello-world.access.log;
              error_log  /var/log/nginx/hello-world.error.log;

              location / {
                  proxy_pass http://localhost:8080;
              }
          }

    - name: Enable Nginx config
      file:
        src: /etc/nginx/sites-available/hello-world
        dest: /etc/nginx/sites-enabled/hello-world
        state: link

    - name: Remove default Nginx config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
